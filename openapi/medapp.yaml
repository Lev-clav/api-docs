openapi: '3.0.3'
info:
  title: Здоровый сон
  description: |
      Всем привет!  
      Данная API документация лежит в основе проекта в сфере MedTech для известной клиники.
      
      Суть проекта:  
      Есть Web-приложение, через которое могут взаимодействовать пользователи. Клиенты клиники могут регистрироваться, загружать данные со своих аппаратов, просматривать статистику показателей из этих данных в разрезе времени, а также давать доступ к врачам для просмотра их статистики и убирать его. Врачи могут привязываться к пациентам для просмотра статистики. Администратор может добавлять/убирать пользователей, просматривать часть информации о них и обновлять информацию о них
  version: '1.0.0'
servers:
  - url: |
        https://api.medapp.com
    description: Test server
paths:
  /profile/{id}:
    get:
      summary: Профиль
      description: Запрос на получение информации об профиле авторизованного пользователя
      tags:
        - Общие запросы
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Профиль_200
          content:
            application/json:
              example:
                ID: 35
                Name: Лев
                Surname: Славутский
                Fathername: Евгеньевич
                Email: Lev.clav@gmail.com
                Model: ResMed
                Birthdate: 08/07/2003
                PhoneNumber: +79312014807
                Additional: Текст для дополнительной информации
        401:
          description: Профиль_401
          content:
            application/json:
              example:
                detail: Authentication credentials were not provided.
        403:
          description: Профиль_403
          content:
            application/json:
              example:
                detail: You do not have permission to perform this action.
        404:
          description: Профиль_404
          content:
            application/json:
              example:
                detail: Not found.
  /auth/login/:
    post:
      summary: Запрос токена
      description: Запрос на получение токенов для дальнейшей работы в системе
      tags:
        - Общие запросы
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              Login_Password_Hash: string
      responses:
        200:
          description: Запрос токена_200
          content:
            application/json:
              example:
                accessToken: jwt_token
                refreshToken: refresh_token
                user:
                  id: 1
                  role: PATIENT
        401:
          description: Запрос токена_401
          content:
            application/json:
              example:
                detail: Authentication credentials were not provided.
                description: Неверная пара логин/пароль. Пожалуйста, убедитесь, что вы ввели правильные данные.
  /auth/refresh:
    post:
      summary: Обновление токена
      description: Запрос на обновление токена
      
      tags:
        - Общие запросы
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              refreshtoken: string
      responses:
        200:
          description: Обновление токена_200
          content:
            application/json:
              example:
                detail: new_jwt_token
        404:
          description: Обновление токена_404
          content:
            application/json:
              example:
                detail: Not found.
                description: Неверный Токен доступа. Пожалуйста, убедитесь, что вы используете правильный токен и что он действителен.
  /auth/reset_password/:
    post:
      summary: Восстановление пароля
      description: Запрос на отправку email для смены пароля
      
      tags:
        - Общие запросы
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              email: string
      responses:
        200:
          description: Восстановление пароля_200
          content:
            application/json:
              example:
                detail: На почту был отправлен код для сброса пароля. Пожалуйста, введите его.
        404:
          description: Восстановление пароля_404
          content:
            application/json:
              example:
                detail: Not found.
                description: Не удаётся найти пользователя с данным Email
  /profile/change_password/:
    patch:
      summary: Смена пароля
      description: ''
      
      tags:
        - Общие запросы
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              Password_Hash: stirng
      responses:
        200:
          description: Смена пароля_200
          content:
            application/json:
              example:
                detail: Ваш пароль был успешно изменён.
  /auth/new:
    post:
      summary: Регистрация
      description: |
          Добавление пользователя может происходить двумя путями:
          
          1) **Самостоятельная регистрация пользователя**  
          2) Добавление пользователя через администратора
      
      tags:
        - User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              Name: string
              Surname: string
              Fathername: string
              Email: string
              RoleID: string
              Model: string
              Birthdate: date
              PhoneNumber: string
              Password_Hash: string
              Additional: string
      responses:
        200:
          description: Регистрация_200
          content:
            application/json:
              example:
                ID: 35
                detail: User has created
        400:
          description: Регистрация_400
          content:
            application/json:
              example:
                detail: This user has already been created. Please try logging in instead.
  /profile/{id}/:
    delete:
      summary: Удаление пользователя
      description: ''
      
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Удаление пользователя_200
          content:
            application/json:
              example:
                detail: User deleted
        404:
          description: Удаление пользователя_404
          content:
            application/json:
              example:
                detail: Cannot find this user.
    get:
      summary: Просмотр информации о пользователе
      description: Запрос аналогичный запросу в общих запросах, за исключением дополнительной информации, которую необходимо оставить исключительно между врачом и пациентом
      
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Просмотр информации о пользователе_200
          content:
            application/json:
              example:
                ID: 35
                Name: Лев
                Surname: Славутский
                Fathername: Евгеньевич
                Email: Lev.clav@gmail.com
                RoleID: Patient
                Model: ResMed
                Birthdate: 08/07/2003
                PhoneNumber: +79312014807
        404:
          description: Просмотр информации о пользователе_404
          content:
            application/json:
              example:
                detail: Not found.
    patch:
      summary: Обновление информации о пользователе
      description: ''
      
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              Fathername: Евгеньевич
      responses:
        200:
          description: Обновление информации о пользователе_200
          content:
            application/json:
              example:
                ID: 35
                Name: Лев
                Surname: Славутский
                Fathername: Евгеньевич
                Email: Lev.clav@gmail.com
                RoleID: Patient
                Model: ResMed
                Birthdate: 08/07/2003
                PhoneNumber: +79312014807
        401:
          description: Обновление информации о пользователе_401
          content:
            application/json:
              example:
                detail: Authentication credentials were not provided.
        404:
          description: Обновление информации о пользователе_404
          content:
            application/json:
              example:
                detail: Not found.
  /admin/users:
    get:
      summary: Получение списка пользователей
      description: ''
      
      tags:
        - Admin
      parameters:
        - name: page
          in: query
          description: ''
          required: false
          schema:
            type: string
          example: '1'
        - name: size
          in: query
          description: ''
          required: false
          schema:
            type: string
          example: '20'
        - name: RoleID
          in: query
          description: ''
          required: false
          schema:
            type: string
          example: ''
        - name: Email
          in: query
          description: ''
          required: false
          schema:
            type: string
          example: ''
      responses:
        200:
          description: Получение списка пользователей_200
          content:
            application/json:
              example: |
                  {
                      "page": 1,
                    "size": 20,
                    "totalPages": 10,
                    "items": [
                      {
                        "id": 1,
                        "email": "user@mail.com",
                        "role": "PATIENT"
                      },
                      {
                        "id": 2,
                        "email": "user@mail.com",
                        "role": "Doctor"
                      },
                    ]
                  }
        401:
          description: Получение списка пользователей_401
          content:
            application/json:
              example:
                detail: Authentication credentials were not provided.
