  /statistics/upload:
    post:
      summary: Загрузка статистики
      description: ''
      
      tags:
        - User
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                Data:
                  type: string
                  format: binary
      responses:
        200:
          description: Загрузка статистики_200
          content:
            application/json:
              example:
                message: Data uploaded successfully
        401:
          description: Загрузка статистики_401
          content:
            application/json:
              example:
                detail: Authentication credentials were not provided.
  /patientslink/{doctorID}:
    delete:
      summary: Отвязать врача от пациента
      description: ''
      
      tags:
        - User
      parameters:
        - name: doctorID
