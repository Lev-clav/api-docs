  name: Здоровый сон
  description: >-
    Всем привет!  

    Данная API документация лежит в основе проекта в сфере MedTech для известной
    клиники.


    Суть проекта:  

    Есть Web-приложение, через которое могут взаимодействовать пользователи.
    Клиенты клиники могут регистрироваться, загружать данные со своих аппаратов,
    просматривать статистику показателей из этих данных в разрезе времени, а
    также давать доступ к врачам для просмотра их статистики и убирать его.
    Врачи могут привязываться к пациентам для просмотра статистики.
    Администратор может добавлять/убирать пользователей, просматривать часть
    информации о них и обновлять информацию о них
  schema: https://schema.getpostman.com/json/collection/v2.1.0/collection.json
  _exporter_id: '40922779'
